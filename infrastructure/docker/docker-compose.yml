# =============================================================================
# Entorno de desarrollo - Muebles C Palma
# Levanta únicamente MySQL; la API y los frontends se ejecutan en local.
# El stack completo de producción está en docker-compose.prod.yml.
# =============================================================================

services:
  mysql:
    image: mysql:8.0
    container_name: cpalma_mysql_container
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-muebles_cpalma_db}
      MYSQL_USER: ${MYSQL_USER:-dev_cpalma_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dev_secure_password_2026}
    volumes:
      # Volumen con nombre: los datos sobreviven a recreaciones del contenedor
      - mysql_data:/var/lib/mysql
      # Scripts de esquema y datos iniciales (solo se ejecutan con el volumen vacío)
      - ./init-db:/docker-entrypoint-initdb.d

volumes:
  mysql_data:
