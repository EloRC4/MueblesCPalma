# =============================================================================
# nginx - Muebles C Palma (producción)
# Sirve la web pública y el panel de administración, y hace de proxy
# inverso hacia la API para que todo funcione bajo un único dominio.
# =============================================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ----- Web pública (HTML/CSS/JS estáticos) -----
    location / {
        try_files $uri $uri/ =404;
    }

    # ----- Panel de administración (React compilado bajo /admin/) -----
    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
    }

    # ----- API: proxy hacia el backend Spring Boot -----
    location /api/ {
        proxy_pass http://api:8080;
        # $http_host conserva el puerto: imprescindible para que Spring
        # identifique correctamente las peticiones same-origin
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Debe coincidir con el límite de subida configurado en Spring
        client_max_body_size 10m;
    }

    # ----- Imágenes de los muebles -----
    # Primero se buscan en el volumen compartido con la API (imágenes
    # subidas desde el panel); si no existen, en las incluidas en la imagen.
    location ^~ /assets/ {
        root /var/www;
        expires 7d;
        try_files $uri @assets_incluidos;
    }

    location @assets_incluidos {
        root /usr/share/nginx/html;
        expires 7d;
    }
}
