# =============================================================================
# nginx - Muebles C Palma (production)
# Serves the public site and the admin panel, and reverse-proxies the API
# so the whole application runs under a single domain.
# =============================================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ----- Public site (static HTML/CSS/JS) -----
    location / {
        try_files $uri $uri/ =404;
    }

    # ----- Admin panel (React build under /admin/) -----
    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
    }

    # ----- API: reverse proxy to the Spring Boot backend -----
    location /api/ {
        proxy_pass http://api:8080;
        # $http_host keeps the port: required for Spring to correctly
        # recognize same-origin requests
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Must match the upload limit configured in Spring
        client_max_body_size 10m;
    }

    # ----- Furniture images -----
    # Look first in the volume shared with the API (images uploaded from
    # the panel); fall back to the ones bundled into this image.
    location ^~ /assets/ {
        root /var/www;
        expires 7d;
        try_files $uri @bundled_assets;
    }

    location @bundled_assets {
        root /usr/share/nginx/html;
        expires 7d;
    }
}
