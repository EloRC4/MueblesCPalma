<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Producto - Muebles C Palma</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            background: var(--surface);
            color: var(--ink);
        }
        .catalog-nav {
            margin-bottom: 30px;
        }
        .container-item {
            max-width: 1000px;
            margin: 50px auto;
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            display: flex;
            gap: 40px;
        }
        .item-imagen-box {
            flex: 1;
            max-width: 500px;
        }
        .item-imagen-box img {
            width: 100%;
            border-radius: 8px;
            object-fit: cover;
        }
        .item-info-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .item-info-box h1 { margin-top: 0; color: var(--primary); }
        .item-categoria { 
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 14px;
            align-self: flex-start;
            margin-bottom: 15px;
        }
        .btn-volver {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: var(--primary);
            color: var(--surface);
            text-decoration: none;
            border-radius: 5px;
            align-self: flex-start;
        }
        .item-galeria {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 10px;
        }
        .galeria-thumb {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 6px;
        }
        @media (max-width: 760px) {
            .container-item {
                flex-direction: column;
                margin: 20px 1rem;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <nav class="catalog-nav">
        <a class="brand" href="index.html">Muebles C Palma</a>
        <ul class="nav-links">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="catalogo.html">Catálogo</a></li>
            <li><a href="contacto.html">Contacto</a></li>
        </ul>
    </nav>

    <div class="container-item" id="contenedor-item">
        <p>Cargando especificaciones del mueble...</p>
    </div>

    <script src="js/item.js"></script>
</body>
</html>
