<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Producto - Muebles C Palma</title>
    <link rel="stylesheet" href="css/estilos.css">
    <style>
        .container-item {
            max-width: 1000px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            display: flex;
            gap: 40px;
        }
        .item-imagen-box {
            flex: 1;
            max-width: 500px;
        }
        .item-imagen-box img {
            width: 100%;
            border-radius: 8px;
            object-fit: cover;
        }
        .item-info-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .item-info-box h1 { margin-top: 0; color: #2c3e50; }
        .item-categoria { 
            display: inline-block;
            background: #e74c3c;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 14px;
            align-self: flex-start;
            margin-bottom: 15px;
        }
        .btn-volver {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #34495e;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            align-self: flex-start;
        }
    </style>
</head>
<body>

    <div class="container-item" id="contenedor-item">
        <p>Cargando especificaciones del mueble...</p>
    </div>

    <script src="js/item.js"></script>
</body>
</html>
