# =============================================================================
# Spring Boot Configuration - Development Environment
# =============================================================================

server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: muebles-c-palma-api

  datasource:
    # Points to localhost because Docker mapped port 3306 to your Fedora host
    url: jdbc:mysql://localhost:3306/muebles_cpalma_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useUnicode=true&characterEncoding=UTF-8
    username: dev_cpalma_user
    password: dev_secure_password_2026
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    # 'validate' ensures Java models match MySQL tables perfectly without modifying them
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

# Logging configuration to monitor SQL queries cleanly in console
logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
