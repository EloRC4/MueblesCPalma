# =============================================================================
# Spring Boot Configuration
# Los valores sensibles se leen de variables de entorno; los valores por
# defecto corresponden al entorno de desarrollo local (Docker en localhost).
# En producción se activa el perfil "prod" (SPRING_PROFILES_ACTIVE=prod).
# =============================================================================

server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: muebles-c-palma-api

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/muebles_cpalma_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useUnicode=true&characterEncoding=UTF-8}
    username: ${DB_USERNAME:dev_cpalma_user}
    password: ${DB_PASSWORD:dev_secure_password_2026}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    # 'validate' garantiza que las entidades coinciden con el esquema real
    # de MySQL sin permitir que Hibernate lo modifique
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

app:
  # Carpeta donde se guardan las imágenes subidas desde el panel de gestión
  upload-dir: ${APP_UPLOAD_DIR:/home/elo/Documentos/Muebles C Palma/frontend-public/assets}
  # Orígenes autorizados para llamadas desde navegador (CORS). En producción,
  # con nginx sirviendo todo bajo el mismo dominio, no se necesitan más.
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

---
# =============================================================================
# Perfil de producción: sin SQL en consola y logging moderado
# =============================================================================
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    show-sql: false

logging:
  level:
    org.hibernate.SQL: INFO
    org.hibernate.type.descriptor.sql.BasicBinder: INFO
    root: INFO
