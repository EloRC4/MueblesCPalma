# =============================================================================
# Spring Boot Configuration
# Sensitive values are read from environment variables; the defaults target
# the local development environment (Docker MySQL on localhost).
# Production runs with the "prod" profile (SPRING_PROFILES_ACTIVE=prod).
# =============================================================================

server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: muebles-c-palma-api

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/muebles_cpalma_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useUnicode=true&characterEncoding=UTF-8}
    username: ${DB_USERNAME:dev_cpalma_user}
    password: ${DB_PASSWORD:dev_secure_password_2026}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    # 'validate' guarantees the entities match the real MySQL schema
    # without ever letting Hibernate modify it
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

app:
  # Folder where images uploaded from the admin panel are stored
  upload-dir: ${APP_UPLOAD_DIR:/home/elo/Documentos/Muebles C Palma/frontend-public/assets}
  # Browser origins allowed to call the API (CORS). In production, with
  # nginx serving everything under one domain, no extra origins are needed.
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

---
# =============================================================================
# Production profile: no SQL echo in the console, moderate logging
# =============================================================================
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    show-sql: false

logging:
  level:
    org.hibernate.SQL: INFO
    org.hibernate.type.descriptor.sql.BasicBinder: INFO
    root: INFO
